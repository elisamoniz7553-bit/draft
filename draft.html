<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capa</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    .cover {
      position: relative;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: url('sua-imagem.jpg') center center / cover no-repeat;
    }

    .cover::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.15) 0%,
        rgba(0, 0, 0, 0.35) 45%,
        rgba(0, 0, 0, 0.55) 100%
      );
    }

    .content {
      position: absolute;
      left: 70px;
      bottom: 90px;
      z-index: 2;
      color: #fff;
      max-width: 760px;
    }

    .title {
      font-size: 118px;
      line-height: 0.88;
      font-weight: 800;
      letter-spacing: -4px;
      text-transform: lowercase;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.35);
    }

    .title span {
      display: block;
    }

    .subtitle {
      margin-top: 22px;
      font-size: 28px;
      line-height: 1.35;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: rgba(255, 255, 255, 0.9);
      max-width: 620px;
    }

    .tag {
      display: inline-block;
      margin-top: 26px;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="content">
      <div class="title">
        <span>negative</span>
        <span>man</span>
      </div>

      <div class="subtitle">
        reflexão, treino, identidade e força mental.
      </div>

      <div class="tag">draft / brand cover</div>
    </div>
  </div>
</body>
</html>
